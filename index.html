<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TSLA 7-Day Tracker | Chart Club</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans">

    <div class="container mx-auto px-4 py-8 max-w-7xl">
        <div class="flex flex-col md:row justify-between items-center mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-3xl font-black text-red-600 uppercase tracking-tighter">
                    Tesla <span class="text-white font-light italic">Weekly Analysis</span>
                </h1>
                <p class="text-gray-500 text-xs mt-1">
                    <span class="inline-block w-2 h-2 bg-green-500 rounded-full mr-2 animate-pulse"></span>
                    Live Data: Feb 26, 2026 | Market Status: <span class="text-green-400">Open</span>
                </p>
            </div>
            <div class="text-right">
                <p class="text-[10px] text-gray-500 uppercase font-bold">Current Price</p>
                <p class="text-2xl font-mono text-white">$418.53 <span class="text-sm text-green-500">+0.27%</span></p>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="bg-[#161b22] p-5 rounded-xl border border-gray-800">
                    <h3 class="text-gray-500 text-[10px] font-bold uppercase mb-4">Weekly Snapshot</h3>
                    <div class="space-y-3">
                        <div class="flex justify-between border-b border-gray-800 pb-2">
                            <span class="text-sm text-gray-400">7D High</span>
                            <span class="text-sm font-mono text-white">$420.34</span>
                        </div>
                        <div class="flex justify-between border-b border-gray-800 pb-2">
                            <span class="text-sm text-gray-400">7D Low</span>
                            <span class="text-sm font-mono text-white">$394.04</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-sm text-gray-400">Volume (Lakhs)</span>
                            <span class="text-sm font-mono text-white">548.1</span>
                        </div>
                    </div>
                </div>
                
                <div class="bg-red-600/10 p-5 rounded-xl border border-red-500/20">
                    <p class="text-[10px] text-red-500 font-bold uppercase">Quick Insight</p>
                    <p class="text-xs text-gray-300 mt-2 leading-relaxed">
                        TSLA recovered from a Monday dip ($394.04). It is now testing major resistance at $420.
                    </p>
                </div>
            </div>

            <div class="lg:col-span-3 bg-[#161b22] p-6 rounded-2xl border border-gray-800">
                <div id="predictionChart" class="w-full h-[500px]"></div>
            </div>
        </div>
    </div>

    <script>
        // --- LIVE DATA: FEB 19 TO FEB 26 ---
        const weeklyData = {
            x: ['Feb 19', 'Feb 20', 'Feb 23', 'Feb 24', 'Feb 25', 'Feb 26 (Today)'],
            open:  [407.25, 408.30, 407.29, 399.50, 412.15, 414.83],
            high:  [415.25, 414.70, 407.70, 410.82, 420.25, 420.34],
            low:   [404.11, 405.50, 394.04, 397.64, 412.18, 412.15],
            close: [411.71, 411.82, 399.83, 409.38, 417.40, 418.53]
        };

        const trace = {
            x: weeklyData.x,
            open: weeklyData.open,
            high: weeklyData.high,
            low: weeklyData.low,
            close: weeklyData.close,
            type: 'candlestick',
            increasing: { line: { color: '#22c55e', width: 2 }, fillcolor: '#22c55e' },
            decreasing: { line: { color: '#ef4444', width: 2 }, fillcolor: '#ef4444' },
            name: 'TSLA 7D'
        };

        const layout = {
            dragmode: 'zoom',
            showlegend: false,
            margin: { r: 10, t: 10, b: 40, l: 50 },
            plot_bgcolor: '#161b22',
            paper_bgcolor: '#161b22',
            xaxis: {
                gridcolor: '#21262d',
                rangeslider: { visible: false },
                tickfont: { color: '#8b949e', size: 10 }
            },
            yaxis: {
                gridcolor: '#21262d',
                tickfont: { color: '#8b949e', size: 10 },
                side: 'right'
            }
        };

        Plotly.newPlot('predictionChart', [trace], layout, { responsive: true, displayModeBar: false });
    </script>
</body>
</html>
