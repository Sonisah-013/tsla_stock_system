<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TSLA 30-Day History & Forecast</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
</head>
<body class="bg-[#0b0e14] text-white font-sans">

    <div class="container mx-auto px-4 py-8 max-w-6xl">
        <header class="flex justify-between items-end mb-8 border-b border-gray-800 pb-6">
            <div>
                <h1 class="text-4xl font-black text-red-600 tracking-tighter uppercase italic">Tesla <span class="text-white">Analytics</span></h1>
                <p class="text-gray-500 font-mono text-sm uppercase tracking-widest mt-1">30-Day Trailing + 30-Day Forecast</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-gray-400 font-bold uppercase">Today's Market (Feb 26)</p>
                <p class="text-3xl font-mono text-green-400">$408.93</p>
            </div>
        </header>

        <div class="bg-[#161b22] p-6 rounded-3xl border border-gray-800 shadow-2xl">
            <div id="fullChart" style="height: 550px;"></div>
        </div>
    </div>

    <script>
        // 1. ACTUAL HISTORICAL DATA (JAN 26 - FEB 26, 2026)
        const historyLabels = [
            'Jan 26', 'Jan 27', 'Jan 28', 'Jan 29', 'Jan 30', 
            'Feb 02', 'Feb 03', 'Feb 04', 'Feb 05', 'Feb 06', 
            'Feb 09', 'Feb 10', 'Feb 11', 'Feb 12', 'Feb 13', 
            'Feb 17', 'Feb 18', 'Feb 19', 'Feb 20', 'Feb 23', 
            'Feb 24', 'Feb 25', 'Feb 26'
        ];

        const historyPrices = [
            435.20, 430.90, 431.46, 416.56, 430.41, 
            421.81, 421.96, 406.01, 397.21, 411.11, 
            417.32, 425.21, 428.27, 417.07, 417.44, 
            410.63, 411.32, 411.71, 411.82, 399.83, 
            409.38, 417.40, 408.93
        ];

        // 2. AUTO-PREDICTION GENERATOR (Next 60 Days)
        const predictionLabels = [];
        const predictionPrices = [];
        let currentPrice = 408.93;
        const todayDate = new Date("2026-02-26");

        for (let i = 1; i <= 30; i++) {
            let d = new Date(todayDate);
            d.setDate(todayDate.getDate() + i);
            predictionLabels.push(d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }));
            
            // Predicting a slight recovery trend (0.15% daily growth)
            currentPrice = currentPrice * 1.0015;
            predictionPrices.push(currentPrice.toFixed(2));
        }

        // 3. CHART TRACES
        const traceHistory = {
            x: historyLabels,
            y: historyPrices,
            name: 'Historical (30 Days)',
            mode: 'lines+markers',
            line: { color: '#ef4444', width: 4 },
            marker: { size: 6 }
        };

        const tracePredict = {
            x: predictionLabels,
            y: predictionPrices,
            name: 'Auto-Predict (March -April 2026)',
            mode: 'lines',
            line: { color: '#3b82f6', width: 3, dash: 'dot' },
            fill: 'tozeroy',
            fillcolor: 'rgba(59, 130, 246, 0.05)'
        };

        const layout = {
            paper_bgcolor: '#161b22',
            plot_bgcolor: '#161b22',
            font: { color: '#fff', family: 'monospace' },
            xaxis: { gridcolor: '#21262d', zeroline: false },
            yaxis: { gridcolor: '#21262d', title: 'TSLA Price (USD)' },
            margin: { t: 40, r: 40, l: 60, b: 80 },
            legend: { orientation: 'h', y: -0.2 }
        };

        Plotly.newPlot('fullChart', [traceHistory, tracePredict], layout);
    </script>
</body>
</html>
